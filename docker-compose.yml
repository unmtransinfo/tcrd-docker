# TCRD database — docker compose
# you can replace "build: ." with "image: unmtransinfo/tcrd_db:latest" if you'd like to use the dockerhub image instead 
#
# Prerequisites:
#   1. cp .env.example .env  && fill in CPUS, MEMORY, HOST_PORT, credentials
#   2. ./tune.sh             # generates mysql-tuning.cnf from your CPUS/MEMORY
#   3. docker compose up -d  # builds image and starts the container

name: tcrd

services:
  db:
    build: .
    volumes:
      - tcrd-mysql-data:/var/lib/mysql
      - ./mysql-tuning.cnf:/etc/mysql/conf.d/tuning.cnf:ro
    # Load MYSQL_ROOT_PASSWORD, MYSQL_DATABASE, DB_USER, DB_PASSWORD, DUMP_URL, TZ
    env_file: .env
    ports:
      - '127.0.0.1:${HOST_PORT}:3306'
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "${CPUS}"
          memory: "${MEMORY}"

volumes:
  tcrd-mysql-data:

